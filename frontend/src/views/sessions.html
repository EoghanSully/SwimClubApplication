<!-- // SESSION PLANS PAGE ROOT WRAPPER FOR FILTERS, GRID, AND MODALS. -->
<div class="container">
  <!-- // HEADER ROW WITH PAGE TITLE AND CREATE PLAN ACTION. -->
  <div class="session-plans-header">
    <h1>Session Plans</h1>
    <button id="create-plan-btn" class="btn btn-primary" onclick="openCreatePlanModal()">+ Create Plan</button>
  </div>

  <!-- // TEAM FILTER BAR USED TO NARROW DISPLAYED PLANS. -->
  <div class="filter-row" style="margin-bottom: 2rem;">
    <select id="plans-team-filter" class="form-input" style="max-width: 280px;"></select>
  </div>

  <!-- // CARD GRID CONTAINER POPULATED BY VIEWMODEL RENDERING. -->
  <div id="session-plans-grid"></div>

  <!-- // CREATE PLAN MODAL WITH FORM INPUTS FOR PLAN CONTENT. -->
  <div id="create-plan-modal" class="modal hidden">
    <div class="modal-content" style="max-width: 720px;">
      <div class="modal-header">
        <h2 class="modal-title">Create Session Plan</h2>
        <button class="modal-header-close" onclick="closeCreatePlanModal()">&times;</button>
      </div>
      <!-- // FORM BODY FOR ALL SESSION PLAN FIELDS. -->
      <form id="create-plan-form" class="modal-body">
        <div class="form-group">
          <label class="form-label">Title</label>
          <input name="title" class="form-input" required />
        </div>
        <div class="form-group">
          <label class="form-label">Team</label>
          <select id="plan-team-select" name="teamId" class="form-input"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <input name="category" class="form-input" />
        </div>
        <div class="form-group">
          <label class="form-label">Warm Up</label>
          <textarea name="warmUp" class="form-textarea"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Main Set</label>
          <textarea name="session" class="form-textarea"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Cool Down</label>
          <textarea name="coolDown" class="form-textarea"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Coach Notes</label>
          <textarea name="extraInfo" class="form-textarea"></textarea>
        </div>
        <!-- // MODAL FOOTER ACTIONS FOR CANCELLING OR SAVING PLAN. -->
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeCreatePlanModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Plan</button>
        </div>
      </form>
    </div>
  </div>

  <!-- // VIEW-ONLY PLAN DETAIL MODAL FOR SELECTED SESSION PLAN. -->
  <div id="view-plan-modal" class="modal hidden">
    <div class="modal-content" style="max-width: 720px;">
      <div class="modal-header">
        <h2 id="view-plan-title" class="modal-title">Session Plan</h2>
        <button class="modal-header-close" onclick="closeViewPlanModal()">&times;</button>
      </div>
      <div id="view-plan-content" class="modal-body"></div>
    </div>
  </div>
</div>
