<!-- // SCHEDULE PAGE ROOT WRAPPER FOR FILTERS, CALENDAR, SIDEBAR, AND MODALS. -->
<div class="container">
  <!-- // HEADER ROW WITH PAGE TITLE AND ROLE-GATED CREATE EVENT ACTION. -->
  <div class="schedule-header">
    <div style="display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;">
      <h1>Schedule & Calendar</h1>
      <button id="create-event-btn" class="btn btn-primary create-event-cta" style="display: none;" onclick="window.openCreateEventModal()">+ Create Event</button>
    </div>
  </div>
  
  <!-- // FILTER CONTAINER POPULATED AT RUNTIME WITH TEAM AND TYPE FILTER CONTROLS. -->
  <div id="schedule-filters" class="schedule-filters"></div>
  
  <!-- // MAIN TWO-COLUMN LAYOUT: CALENDAR ON LEFT, DAY EVENTS ON RIGHT. -->
  <div class="schedule-layout">
    <!-- // CALENDAR PANEL SHOWING MONTH NAVIGATION AND DAY GRID. -->
    <div class="calendar-section">
      <div class="calendar-nav">
        <button id="calendar-prev" class="nav-arrow">← Previous</button>
        <h2 id="calendar-month-year"></h2>
        <button id="calendar-next" class="nav-arrow">Next →</button>
      </div>
      
      <div id="calendar-grid" class="calendar-grid"></div>
    </div>
    
    <!-- // DAY EVENTS SIDEBAR SHOWING EVENTS FOR THE SELECTED DATE. -->
    <div class="day-events-section">
      <div id="day-events" class="empty-state">
        <p>Select a date to view events</p>
        <button id="create-event-empty-btn" class="btn btn-primary create-event-empty-btn" style="display: none;" onclick="window.openCreateEventModal()">+ Create Event</button>
      </div>
    </div>
  </div>
  
  <!-- // EVENT DETAIL MODAL FOR READ-ONLY EVENT INFORMATION. -->
  <div class="event-detail-modal" id="event-modal" style="display: none;">
    <div class="modal-overlay" onclick="window.closeEventModal()"></div>
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <h2 class="modal-title" id="event-modal-title"></h2>
          <p class="modal-subtitle" id="event-modal-meta"></p>
        </div>
        <button class="modal-header-close" onclick="window.closeEventModal()">×</button>
      </div>
      <div id="event-modal-content"></div>
    </div>
  </div>

  <!-- // CREATE EVENT MODAL FORM USED BY AUTHORISED USERS. -->
  <div id="create-event-modal" class="modal" style="display: none;">
    <div class="modal-overlay" onclick="window.closeCreateEventModal()"></div>
    <div class="modal-content">
      <div class="modal-header bg-maroon">
        <h2 class="modal-title text-white">Create Event</h2>
        <button class="modal-close text-white" onclick="window.closeCreateEventModal()">×</button>
      </div>
      <form id="create-event-form" style="padding: var(--spacing-8);">
        <!-- // CORE EVENT DETAILS ROW: TITLE AND CATEGORY. -->
        <div class="form-row" style="display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1rem;">
          <div class="form-group">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <select name="category" class="form-select form-input" required>
              <option value="TRAINING">Training</option>
              <option value="COMPETITION">Competition</option>
              <option value="SOCIAL">Social</option>
              <option value="SOCIETY">Society</option>
            </select>
          </div>
        </div>

        <!-- // DATE AND START TIME ROW FOR EVENT TIMING. -->
        <div class="form-row" style="display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1rem;">
          <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" name="eventDate" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label">Start Time</label>
            <input type="time" name="startTime" class="form-input" required>
          </div>
        </div>

        <!-- // DURATION AND AUDIENCE ROW FOR SCOPING THE EVENT. -->
        <div class="form-row" style="display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1rem;">
          <div class="form-group">
            <label class="form-label">Duration (minutes)</label>
            <input type="number" name="durationMinutes" class="form-input" min="15" step="5" value="60" required>
          </div>
          <div class="form-group">
            <label class="form-label">Audience</label>
            <select name="audience" id="event-audience" class="form-select form-input" required>
              <option value="club">All Club</option>
              <option value="team">Specific Team</option>
            </select>
          </div>
        </div>

        <!-- // TEAM SELECTOR SHOWN ONLY WHEN AUDIENCE IS TEAM-SPECIFIC. -->
        <div class="form-group" id="event-team-group" style="display: none;">
          <label class="form-label">Team</label>
          <select name="teamId" id="event-team-select" class="form-select form-input">
            <option value="">Select team</option>
          </select>
        </div>

        <!-- // VENUE INPUT FOR EVENT LOCATION DETAILS. -->
        <div class="form-group">
          <label class="form-label">Venue</label>
          <input type="text" name="venue" class="form-input" required>
        </div>

        <!-- // DESCRIPTION FIELD FOR OPTIONAL EVENT NOTES. -->
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea name="description" class="form-textarea"></textarea>
        </div>

        <!-- // FORM ACTIONS FOR CANCEL AND CREATE SUBMIT. -->
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="window.closeCreateEventModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Event</button>
        </div>
      </form>
    </div>
  </div>
</div>
