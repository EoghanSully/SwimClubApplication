<!-- Events/Schedule View -->
<div class="events-container container">
	<div class="events-header announcements-header-row">
		<h1 class="page-title">Schedule & Events</h1>
		<button class="create-event-btn btn btn-primary hidden" id="create-event-btn" style="display: none;">
			+ Create Event
		</button>
	</div>

	<div class="events-filters">
		<div class="filter-group">
			<label class="filter-label">Event Type</label>
			<select id="type-filter" class="filter-select form-input">
				<option value="ALL">All Types</option>
				<option value="TRAINING">Training</option>
				<option value="COMPETITION">Competition</option>
				<option value="SOCIAL">Social</option>
				<option value="SOCIETY">Society</option>
			</select>
		</div>
		<div class="filter-group">
			<label class="filter-label">Team</label>
			<select id="team-filter" class="filter-select form-input">
				<option value="ALL">All Teams</option>
			</select>
		</div>
	</div>

	<div class="calendar-view" id="calendar-view">
		<div class="calendar-header">
			<button class="calendar-nav-btn">‹</button>
			<h2 class="calendar-month" id="calendar-month">Schedule</h2>
			<button class="calendar-nav-btn">›</button>
		</div>
		<div class="calendar-grid">
			<div class="calendar-header-row">
				<div class="calendar-header-cell">Sun</div>
				<div class="calendar-header-cell">Mon</div>
				<div class="calendar-header-cell">Tue</div>
				<div class="calendar-header-cell">Wed</div>
				<div class="calendar-header-cell">Thu</div>
				<div class="calendar-header-cell">Fri</div>
				<div class="calendar-header-cell">Sat</div>
			</div>
			<div id="calendar-weeks"></div>
		</div>
	</div>

	<div class="list-view" id="list-view" style="display: none;">
		<div class="events-list" id="events-list"></div>
	</div>
</div>
