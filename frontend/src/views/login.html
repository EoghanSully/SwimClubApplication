<!-- Login View -->
<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">UG</div>
      <h1 class="login-title">University of Galway</h1>
      <h2 class="login-subtitle">Swim Club Portal</h2>
    </div>

    <form id="login-form" class="login-form">
      <div id="login-error" class="error-message hidden" style="margin-bottom: 1rem;"></div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input
          id="email-input"
          type="email"
          name="email"
          class="form-input"
          placeholder="your.email@galway.ie"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input
          id="password-input"
          type="password"
          name="password"
          class="form-input"
          placeholder="Enter your password"
          required
        >
      </div>

      <button type="submit" class="login-btn">Sign In</button>
    </form>
  </div>
</div>
