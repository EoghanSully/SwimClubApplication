<!-- Session Plan Detail Modal Component -->
<div id="view-plan-modal" class="modal" style="display: none;">
  <div class="modal-overlay" onclick="closeViewPlanModal()"></div>
  <div class="modal-content modal-large">
    <div class="modal-header bg-maroon">
      <div>
        <h2 id="plan-modal-title" class="modal-title text-white"></h2>
        <p id="plan-modal-subtitle" class="modal-subtitle text-white"></p>
      </div>
      <button class="modal-close text-white" onclick="closeViewPlanModal()">×</button>
    </div>
    <div id="plan-view-content" class="plan-view-content"></div>
  </div>
</div>
