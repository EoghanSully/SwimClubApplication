<!-- Announcement Sidebar Card Template -->
<!-- Rendered in app.js renderPersistentAnnouncementsSidebar() and dashboardVM renderAnnouncements() -->
<!-- Placeholders: {{index}}, {{categoryColor}}, {{category}}, {{date}}, {{title}}, {{author}} -->
<div class="announcement-sidebar-item" data-announcement-index="{{index}}" style="cursor: pointer;">
  <div class="announcement-sidebar-meta">
    <div class="announcement-sidebar-category" style="background: {{categoryColor}}; color: white;">{{category}}</div>
    <div class="announcement-sidebar-date">{{date}}</div>
  </div>
  <div class="announcement-sidebar-title">{{title}}</div>
  <div class="announcement-sidebar-author">{{author}}</div>
</div>
