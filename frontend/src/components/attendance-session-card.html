<!-- attendance session card -->
<!-- used in attendance viewmodel session list -->
<article class="attendance-session-item {{activeClass}}" data-event-id="{{eventId}}">
  <span class="attendance-session-tag">{{teamName}}</span>
  <h4 class="attendance-session-date">{{displayDate}}</h4>
  <p class="attendance-session-time">{{timeRange}}</p>
  <div class="attendance-session-metrics">
    <span>✓ {{presentCount}}</span>
    <span>✕ {{absentCount}}</span>
  </div>
</article>
