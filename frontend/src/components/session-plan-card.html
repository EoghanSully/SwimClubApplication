<!-- session plan card -->
<!-- used in session plans viewmodel grid render -->
<article class="session-plan-card" data-plan-id="{{id}}">
  <div class="plan-card-header">
    <h3 class="plan-card-title">{{title}}</h3>
  </div>
  <div class="plan-card-content">
    <div class="plan-card-meta">
      <span aria-hidden="true">🕒</span>
      <span>{{editedLabel}}</span>
    </div>
    <div class="plan-card-team-section">
      <span aria-hidden="true">👥</span>
      <span class="plan-card-team">{{teamName}}</span>
    </div>
  </div>
</article>
